basePath: /
definitions:
  domain.Greeting:
    properties:
      createdAt:
        type: string
      id:
        type: string
      message:
        type: string
    type: object
  http.createGreetingRequest:
    properties:
      id:
        example: greeting-123
        type: string
      message:
        example: Hello, World!
        type: string
    type: object
  http.loginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: password123
        type: string
    type: object
  http.loginResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI...
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is an API Server for the Golang Template application following
    DDD architecture.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Golang Template API
  version: "1.0"
paths:
  /api/v1/greetings:
    get:
      description: List all greetings
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Greeting'
            type: array
      summary: List Greetings
      tags:
      - greetings
    post:
      consumes:
      - application/json
      description: Create a new greeting
      parameters:
      - description: Greeting Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.createGreetingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Greeting'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create Greeting
      tags:
      - greetings
  /api/v1/greetings/{id}:
    get:
      description: Get a greeting by ID
      parameters:
      - description: Greeting ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Greeting'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get Greeting
      tags:
      - greetings
  /api/v1/login:
    post:
      consumes:
      - application/json
      description: Login to get an access token
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.loginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /api/v1/me:
    get:
      description: Get current user profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get Profile
      tags:
      - auth
  /healthz:
    get:
      description: Check if the server is healthy
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health Check
      tags:
      - health
securityDefinitions:
  BearerAuth:
    description: Bearer token (prefix with "Bearer ")
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose    # HTTP response body not closed
    - errorlint    # error wrapping pitfalls
    - exhaustive   # exhaustive enum switches
    - gocritic     # opinionated code checks
    - misspell     # spelling mistakes
    - revive       # replacement for golint
  disable:
    - depguard
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: unused-parameter
          disabled: true
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - exitAfterDefer  # os.Exit after defer is intentional in main()
        - hugeParam       # passing config structs by value is intentional
  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: "_test\\.go"
        linters: [gocritic, revive]
      - path: "docs/swagger/"
        linters: [all]
